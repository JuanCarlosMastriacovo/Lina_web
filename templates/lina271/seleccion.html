<div x-data="{
  desde:      '',
  hasta:      '{{ hoy }}',
  codiin:     '0',
  codifi:     '9999',
  cliein:     '',
  cliefi:     '',
  saldo_cero: '1',
  fetchClie(campo, target) {
    var cod = parseInt(this[campo]) || 0;
    if (cod <= 0) { this[target] = ''; return; }
    fetch('/lina271/clie/info?cliecodi=' + cod)
      .then(function(r) { return r.json(); })
      .then(function(d) { this[target] = d.cliename || ''; }.bind(this))
      .catch(function() { this[target] = ''; }.bind(this));
  },
  abrir(base) {
    var p = new URLSearchParams();
    if (this.desde)  p.set('desde',  this.desde);
    p.set('hasta',      this.hasta      || '{{ hoy }}');
    p.set('codiin',     this.codiin     || '0');
    p.set('codifi',     this.codifi     || '9999');
    p.set('saldo_cero', this.saldo_cero || '1');
    (window.top || window).open(base + '?' + p.toString(), '_blank');
  }
}" style="font-family:Arial; font-size:9pt; padding:20px;">

  <h3 style="font-size:11pt; margin-bottom:16px;">Resumen de Cuenta Clientes — Selección</h3>

  <div style="display:flex; flex-direction:column; gap:10px; max-width:520px;">

    <div style="display:flex; align-items:center; gap:8px;">
      <label style="width:170px; font-size:8pt;">Desde fecha:</label>
      <input type="date" x-model="desde"
             x-init="$nextTick(() => { $el.focus(); })"
             style="padding:3px 6px; border:1px solid #ccc; border-radius:3px; font-size:8.5pt;">
    </div>

    <div style="display:flex; align-items:center; gap:8px;">
      <label style="width:170px; font-size:8pt;">Hasta fecha:</label>
      <input type="date" x-model="hasta"
             style="padding:3px 6px; border:1px solid #ccc; border-radius:3px; font-size:8.5pt;">
    </div>

    <div style="display:flex; align-items:center; gap:8px;">
      <label style="width:170px; font-size:8pt;">
        Cliente Desde [0=todos] <span style="color:#888;">(F4)</span>:
      </label>
      <input type="text" x-model="codiin" maxlength="4"
             @change="fetchClie('codiin', 'cliein')"
             data-selector-tabla="linaclie"
             data-selector-campo-cod="cliecodi"
             data-selector-campo-desc="cliename"
             data-selector-titulo="Buscar Cliente (Desde)"
             style="width:55px; padding:3px 6px; border:1px solid #ccc;
                    border-radius:3px; font-size:8.5pt; text-align:right;">
      <span x-text="cliein" style="font-size:8.5pt; color:#555;"></span>
    </div>

    <div style="display:flex; align-items:center; gap:8px;">
      <label style="width:170px; font-size:8pt;">
        Cliente Hasta <span style="color:#888;">(F4)</span>:
      </label>
      <input type="text" x-model="codifi" maxlength="4"
             @change="fetchClie('codifi', 'cliefi')"
             data-selector-tabla="linaclie"
             data-selector-campo-cod="cliecodi"
             data-selector-campo-desc="cliename"
             data-selector-titulo="Buscar Cliente (Hasta)"
             style="width:55px; padding:3px 6px; border:1px solid #ccc;
                    border-radius:3px; font-size:8.5pt; text-align:right;">
      <span x-text="cliefi" style="font-size:8.5pt; color:#555;"></span>
    </div>

    <div style="display:flex; align-items:center; gap:8px;">
      <label style="width:170px; font-size:8pt;">Saldos en cero:</label>
      <label style="font-size:8.5pt; cursor:pointer;">
        <input type="radio" x-model="saldo_cero" value="1"> Sí
      </label>
      <label style="font-size:8.5pt; cursor:pointer; margin-left:10px;">
        <input type="radio" x-model="saldo_cero" value="0"> No
      </label>
    </div>

    <div style="display:flex; gap:8px; margin-top:8px;">
      <button type="button" @click="abrir('/lina271/pdf')"
              style="padding:6px 14px; background:#4472C4; color:white;
                     border:none; border-radius:4px; cursor:pointer; font-size:8.5pt;">
        Ver PDF
      </button>
      <button type="button" @click="abrir('/lina271/xlsx')"
              style="padding:6px 14px; background:#217346; color:white;
                     border:none; border-radius:4px; cursor:pointer; font-size:8.5pt;">
        Ver XLSX
      </button>
      <button type="button" @click="abrir('/lina271/txt')"
              style="padding:6px 14px; background:#92400e; color:white;
                     border:none; border-radius:4px; cursor:pointer; font-size:8.5pt;">
        Ver TXT
      </button>
    </div>

  </div>

</div>
