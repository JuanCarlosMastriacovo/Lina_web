<!-- ══ MENÚ CONTEXTUAL ══ -->
<div id="lina31-ctx"
     style="display:none; position:fixed; z-index:9999; background:#fff;
            border:1px solid #bbb; border-radius:3px; box-shadow:2px 2px 8px rgba(0,0,0,.25);
            font-family:Arial; font-size:8.5pt; min-width:110px;">
  <div id="lina31-ctx-modificar" class="ctx-item">Modificar</div>
  <div style="border-top:1px solid #eee;"></div>
  <div id="lina31-ctx-subir"    class="ctx-item">Subir</div>
  <div id="lina31-ctx-bajar"    class="ctx-item">Bajar</div>
  <div style="border-top:1px solid #eee;"></div>
  <div id="lina31-ctx-eliminar" class="ctx-item-danger">Eliminar</div>
</div>

<!-- ══ RAÍZ DEL FORMULARIO ══ -->
<div id="lina31-root" class="d-flex flex-column h-100"
     style="background-color:cornsilk; min-height:0; font-family:Arial; font-size:8.5pt;">

  <!-- BARRA SUPERIOR -->
  <div class="border-bottom px-2 py-1" style="background:#f5f5f5; flex-shrink:0;">
    <span style="font-weight:bold; font-size:9pt;">Nuevo Registro de Factura de Compra</span>
    <span class="ms-2 text-muted" style="font-size:7.5pt;">FCHE</span>
  </div>

  <!-- ══ FASE 1: ingreso de proveedor ══ -->
  <div id="lina31-fase1" class="flex-grow-1 p-3" style="min-height:0;">
    <div class="d-flex align-items-center gap-2">
      <label style="font-size:8pt; color:#555; white-space:nowrap;">
        N° Proveedor <span style="color:#888;">(F4)</span>:
      </label>
      <input type="text" id="lina31-provcodi" maxlength="6"
             data-selector-tabla="linaprov"
             data-selector-campo-cod="provcodi"
             data-selector-campo-desc="provname"
             data-selector-titulo="Buscar Proveedor"
             style="width:70px; padding:3px 6px; border:1px solid #ccc;
                    border-radius:3px; font-size:9pt; text-align:right;">
      <span id="lina31-provname" style="font-size:9pt;"></span>
    </div>
  </div>

  <!-- ══ FASE 2: grilla + ingreso de renglones (oculta al inicio) ══ -->
  <div id="lina31-fase2" class="d-flex flex-column flex-grow-1"
       style="min-height:0; display:none !important;">

    <!-- Resumen proveedor -->
    <div class="px-2 py-1 border-bottom"
         style="flex-shrink:0; background:#fffff0; font-size:8pt;">
      Proveedor: <strong id="lina31-prov-resumen"></strong>
    </div>

    <!-- GRILLA DE LÍNEAS INGRESADAS -->
    <div style="overflow-y:auto; flex:1 1 0; min-height:300px;">
      <table id="lina31-grid"
             style="width:100%; border-collapse:collapse; font-size:8pt; table-layout:fixed;">
        <colgroup>
          <col style="width:30px;">
          <col style="width:90px;">
          <col style="width:110px;">
          <col style="width:50px;">
          <col style="width:60px;">
          <col style="width:75px;">
          <col style="width:80px;">
        </colgroup>
        <thead>
          <tr style="background:#4472C4; color:white; position:sticky; top:0;">
            <th style="padding:2px 4px; text-align:center;">#</th>
            <th style="padding:2px 4px;">Código</th>
            <th style="padding:2px 4px;">Descripción</th>
            <th style="padding:2px 4px; text-align:right;">Exist.</th>
            <th style="padding:2px 4px; text-align:right;">Cant.</th>
            <th style="padding:2px 4px; text-align:right;">Precio</th>
            <th style="padding:2px 4px; text-align:right;">Subtotal</th>
          </tr>
        </thead>
        <tbody id="lina31-tbody">
        </tbody>
      </table>
    </div>

    <!-- BARRA DE TOTAL (siempre visible, fuera del scroll) -->
    <div style="flex-shrink:0; background:#e9eff9; border-top:2px solid #4472C4;
                border-bottom:1px solid #ccc; padding:2px 6px;
                display:flex; justify-content:flex-end; align-items:center; gap:16px;
                font-size:8pt; font-weight:bold;">
      <span style="color:#555;">TOTAL unid.:</span>
      <span id="lina31-total-cant" style="font-family:monospace; min-width:40px; text-align:right;">0</span>
      <span style="color:#555; margin-left:12px;">TOTAL $:</span>
      <span id="lina31-total-importe" style="font-family:monospace; font-size:9pt; min-width:80px; text-align:right;">$ 0,00</span>
    </div>

    <!-- SEPARADOR -->
    <div style="flex-shrink:0; height:5px; background:#f0ede0;"></div>

    <!-- FILA DE INGRESO (mismas columnas que la grilla) -->
    <div id="lina31-ingreso" style="flex-shrink:0; padding:3px 0;">
      <table id="lina31-input-table"
             style="width:100%; border-collapse:collapse; font-size:8pt; table-layout:fixed;">
        <colgroup>
          <col style="width:30px;">
          <col style="width:90px;">
          <col style="width:110px;">
          <col style="width:50px;">
          <col style="width:60px;">
          <col style="width:75px;">
          <col style="width:80px;">
        </colgroup>
        <tbody>
          <tr>
            <!-- # renglón -->
            <td style="padding:1px 4px; text-align:center; color:#888; font-size:8pt;">
              <span id="inp-reng">1</span>
            </td>
            <!-- Código -->
            <td style="padding:1px 3px;">
              <input type="text" id="inp-articodi" maxlength="9"
                     data-selector-tabla="linaarti"
                     data-selector-campo-cod="articodi"
                     data-selector-campo-desc="artidesc"
                     data-selector-titulo="Buscar Artículo"
                     placeholder="Código (F4)"
                     style="width:100%; padding:1px 3px; border:1px solid #aaa;
                            border-radius:2px; font-size:8pt; text-transform:uppercase;
                            background:#fffff8;">
            </td>
            <!-- Descripción (auto-fill; editable solo para *) -->
            <td style="padding:1px 3px;">
              <input type="text" id="inp-desc" readonly tabindex="-1"
                     style="width:100%; padding:1px 3px; border:1px solid #ddd;
                            border-radius:2px; font-size:8pt; background:#f0f0f0;">
            </td>
            <!-- Existencia -->
            <td style="padding:1px 4px; text-align:right; font-family:monospace; font-size:8pt;">
              <span id="inp-exis" style="color:#555;"></span>
            </td>
            <!-- Cantidad -->
            <td style="padding:1px 3px;">
              <input type="number" id="inp-cant" step="1" value=""
                     placeholder="Cant."
                     style="width:100%; padding:1px 3px; border:1px solid #aaa;
                            border-radius:2px; font-size:8pt; text-align:right;
                            background:#fffff8;">
            </td>
            <!-- Precio (siempre editable — lo ingresa el operador) -->
            <td style="padding:1px 3px;">
              <input type="text" id="inp-unit"
                     placeholder="Precio"
                     style="width:100%; padding:1px 3px; border:1px solid #aaa;
                            border-radius:2px; font-size:8pt; text-align:right;
                            font-family:monospace; background:#fffff8; color:#444;">
            </td>
            <!-- Subtotal (calculado) -->
            <td style="padding:1px 4px; text-align:right; font-family:monospace; font-size:8pt; font-weight:bold; color:#333;">
              <span id="inp-subtotal"></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- PANEL DE OBSERVACIÓN -->
    <div style="flex-shrink:0; padding:4px 8px; background:#fffff0; border-top:1px solid #ccc;">
      <div class="d-flex align-items-center gap-3" style="font-size:8.5pt;">
        <label style="white-space:nowrap; color:#555;">Observación:
          <input type="text" id="fche-obse" maxlength="40"
                 style="width:260px; padding:1px 4px; border:1px solid #aaa;
                        border-radius:2px; font-size:8.5pt; background:#fffff8;">
        </label>
      </div>
    </div>

  </div><!-- fin fase2 -->

  <!-- BARRA INFERIOR -->
  <div class="border-top px-2 py-1 d-flex gap-2 align-items-center"
       style="background:#f5f5f5; flex-shrink:0;">

    <button type="button" id="lina31-btn-guardar" disabled
            data-hotkey="F8"
            style="padding:3px 14px; background:#2e7d32; color:white; border:none;
                   border-radius:4px; cursor:pointer; font-size:8.5pt; opacity:0.5;">
      Guardar (F8)
    </button>

    <button type="button" id="lina31-btn-cancelar"
            style="padding:3px 12px; background:#fff; color:#555;
                   border:1px solid #ccc; border-radius:4px; cursor:pointer; font-size:8.5pt;">
      ✕ Cancelar
    </button>
  </div>

</div><!-- fin root -->

<script id="lina31-config" type="application/json">{"maxLineas": {{ max_lineas }}}</script>
<script>
  (function () {
    var s = document.createElement('script');
    s.src = '/static/js/lina31.js';
    document.head.appendChild(s);
  })();
</script>
