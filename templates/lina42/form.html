<!-- ══ RAÍZ ══ -->
<div id="lina42-root" class="d-flex flex-column h-100"
     style="background-color:cornsilk; min-height:0; font-family:Arial; font-size:8.5pt;">

  <!-- BARRA SUPERIOR -->
  <div class="border-bottom px-2 py-1" style="background:#f5f5f5; flex-shrink:0;">
    <span style="font-weight:bold; font-size:9pt;">Entradas y Salidas de Efectivo</span>
    <span class="ms-2 text-muted" style="font-size:7.5pt;">LINA42</span>
  </div>

  <!-- FORMULARIO -->
  <div class="flex-grow-1 p-3" style="min-height:0;">

    <div style="display:flex; flex-direction:column; gap:10px; max-width:480px;">

      <!-- Proveedor -->
      <div style="display:flex; align-items:center; gap:8px;">
        <label style="width:130px; font-size:8pt; color:#555; white-space:nowrap;">
          N° Proveedor <span style="color:#888;">(F4)</span>:
        </label>
        <input type="text" id="lina42-provcodi" maxlength="6"
               data-selector-tabla="linaprov"
               data-selector-campo-cod="provcodi"
               data-selector-campo-desc="provname"
               data-selector-titulo="Buscar Proveedor"
               style="width:70px; padding:3px 6px; border:1px solid #ccc;
                      border-radius:3px; font-size:9pt; text-align:right;">
        <span id="lina42-provname" style="font-size:9pt; color:#333;"></span>
      </div>

      <!-- Concepto -->
      <div style="display:flex; align-items:center; gap:8px;">
        <label style="width:130px; font-size:8pt; color:#555; white-space:nowrap;">
          Concepto:
        </label>
        <input type="text" id="lina42-concepto" maxlength="30"
               style="flex:1; padding:3px 6px; border:1px solid #ccc;
                      border-radius:3px; font-size:8.5pt; background:#fffff8;">
      </div>

      <!-- Importe -->
      <div style="display:flex; align-items:center; gap:8px;">
        <label style="width:130px; font-size:8pt; color:#555; white-space:nowrap;">
          Importe $:
        </label>
        <input type="number" id="lina42-importe" step="0.01"
               style="width:120px; padding:3px 6px; border:1px solid #ccc;
                      border-radius:3px; font-size:8.5pt; text-align:right;
                      background:#fffff8;">
        <span style="font-size:7.5pt; color:#888;">
          positivo&nbsp;=&nbsp;salida&nbsp;·&nbsp;negativo&nbsp;=&nbsp;entrada
        </span>
      </div>

    </div>

  </div>

  <!-- BARRA INFERIOR -->
  <div class="border-top px-2 py-1 d-flex gap-2 align-items-center"
       style="background:#f5f5f5; flex-shrink:0;">
    <button id="lina42-btn-guardar"
            style="padding:3px 14px; background:#2e7d32; color:white; border:none;
                   border-radius:4px; cursor:pointer; font-size:8.5pt;">
      Guardar (Ctrl+S)
    </button>
    <button id="lina42-btn-limpiar"
            style="padding:3px 12px; background:#fff; color:#555;
                   border:1px solid #ccc; border-radius:4px; cursor:pointer; font-size:8.5pt;">
      ✕ Limpiar
    </button>
  </div>

</div><!-- fin root -->

<script>
  (function () {
    var s = document.createElement('script');
    s.src = '/static/js/lina42.js';
    document.head.appendChild(s);
  })();
</script>
